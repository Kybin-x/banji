<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — 班级管理系统</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .toast-container {
      top: 24px;
    }
  </style>
</head>

<body>

  <div id="page-transition"></div>

  <div class="login-page">
    <div class="login-bg-glow"></div>
    <div class="login-bg-grid"></div>

    <div class="login-card">

      <div class="login-logo">
        <div class="login-logo-icon">🏫</div>
        <div class="login-logo-text">
          <div class="logo-main">班级管理系统</div>
          <div class="logo-sub">CLASS MANAGEMENT SYSTEM</div>
        </div>
      </div>

      <h2 class="login-title">欢迎登录</h2>
      <p class="login-subtitle">请选择角色并输入账号信息</p>

      <!-- 角色选择 -->
      <div class="role-tabs" id="role-tabs">
        <div class="role-tab active" data-role="teacher">
          <div class="role-tab-icon">👩‍🏫</div>
          <div class="role-tab-label">班主任</div>
        </div>
        <div class="role-tab" data-role="cadre">
          <div class="role-tab-icon">⭐</div>
          <div class="role-tab-label">班干部</div>
        </div>
        <div class="role-tab" data-role="student">
          <div class="role-tab-icon">🎒</div>
          <div class="role-tab-label">学生</div>
        </div>
        <div class="role-tab" data-role="parent">
          <div class="role-tab-icon">👨‍👩‍👧</div>
          <div class="role-tab-label">家长</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-user">账号（手机号）</label>
        <input class="form-input" id="login-user" type="tel" placeholder="请输入手机号" maxlength="11"
          autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="login-pass">密码</label>
        <input class="form-input" id="login-pass" type="password" placeholder="请输入密码" autocomplete="current-password">
        <div class="form-hint" id="login-hint">班主任账号：手机号 / 自定义密码</div>
      </div>

      <!-- 演示提示 -->
      <div id="demo-tip" style="
      margin-bottom:16px; padding:10px 14px; border-radius:10px;
      background:rgba(14,165,233,0.08); border:1px solid rgba(14,165,233,0.2);
      font-size:12px; color:var(--text-secondary); line-height:1.8;">
        <span style="color:var(--color-teal-light);font-weight:600;">演示模式</span>
        · 账号已预填，直接登录即可<br>
        <span id="demo-account-info">班主任 13800000000 / 密码 123456</span>
      </div>

      <button class="btn-login" id="login-btn">登 录</button>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const DEMO_TIPS = {
      teacher: '班主任 13800000000 / 密码 123456',
      cadre: '班干部 13800000099 / 密码 0099',
      student: '学生   13800000002 / 密码 0002',
      parent: '家长   13800000100 / 密码 0100',
    };
    const DEMO_HINTS = {
      teacher: '班主任账号：手机号 / 自定义密码',
      cadre: '班干账号：手机号 / 初始密码身份证后4位',
      student: '学生账号：手机号 / 初始密码身份证后4位',
      parent: '家长账号：手机号 / 初始密码身份证后4位',
    };

    document.addEventListener('DOMContentLoaded', () => {
      // 根据 DEMO_MODE 决定是否显示演示提示框
      const demoEl = document.getElementById('demo-tip');
      if (demoEl) {
        demoEl.style.display = (typeof DEMO_MODE !== 'undefined' && DEMO_MODE) ? 'block' : 'none';
      }
      initLoginPage();
      updateDemoTip('teacher');
    });

    document.getElementById('role-tabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.role-tab');
      if (!tab) return;
      updateDemoTip(tab.dataset.role);
    });

    function updateDemoTip(role) {
      const info = document.getElementById('demo-account-info');
      const hint = document.getElementById('login-hint');
      if (info && typeof DEMO_MODE !== 'undefined' && DEMO_MODE) {
        info.textContent = DEMO_TIPS[role] || '';
      }
      if (hint) {
        hint.textContent = DEMO_HINTS[role] || '';
      }
    }
  </script>
</body>

</html>
