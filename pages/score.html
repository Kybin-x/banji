<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成绩管理 — 班级管理系统</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>

<div id="page-transition"></div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"  id="sidebar-logo"></div>
    <div class="sidebar-user"  id="sidebar-user"></div>
    <nav class="sidebar-nav"   id="sidebar-nav"></nav>
    <div class="sidebar-footer" id="sidebar-footer"></div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="main-area">
    <header class="topbar">
      <div class="flex items-center gap-sm">
        <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
        <div>
          <div class="topbar-title"    id="topbar-title">成绩管理</div>
          <div class="topbar-subtitle" id="topbar-subtitle"></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-chip">
          <span class="status-dot"></span>
          <span id="topbar-date"></span>
        </div>
        <div class="topbar-notif" onclick="navigateTo('notice.html')" title="通知">
          🔔
          <span class="notif-dot" id="topbar-notif-dot" style="display:none"></span>
        </div>
      </div>
    </header>

    <div class="page-content" id="page-content">
      <div class="skeleton" style="height:60px;margin-bottom:16px;"></div>
      <div class="skeleton" style="height:400px;border-radius:16px;"></div>
    </div>
  </div>
</div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/layout.js"></script>
  <script src="../js/excel.js"></script>

<script src="../js/modules/score.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('topbar-date').textContent = formatDateWithWeekday(new Date());
    initLayout({
      pageId: 'score',
      onReady: (session) => initPage(session),
    });
  });
</script>
</body>
</html>
